<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Visually - Interactive algorithm visualization platform. Visualize sorting, searching, trees, graphs, DP, and more with source code in C++, Java, and Python.">
  <title>Visually — Algorithm Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <!-- Sidebar Overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar Navigation -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="sidebar-collapse-btn" id="sidebar-collapse" title="Collapse sidebar">◀</button>
    </div>
    <div class="sidebar-expand-area">
      <button class="sidebar-expand-btn" id="sidebar-expand" title="Expand sidebar">▶</button>
    </div>
    <div class="sidebar-search">
      <input type="text" id="search-input" placeholder="Search algorithms...">
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer">
      <span style="font-size:0.75rem;color:var(--text-muted)">20 Algorithms</span>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    <div class="top-bar">
      <div>
        <button class="hamburger" id="hamburger">☰</button>
        <span class="breadcrumb" id="breadcrumb">
          <span class="current">Home</span>
        </span>
      </div>
      <span class="navbar-logo" onclick="navigate('home')" style="cursor:pointer">✦ Visually</span>
      <div class="top-bar-actions">
        <div class="github-link-wrapper">
          <a href="https://github.com/binaryofbaaj/Visually" target="_blank" class="github-link" id="github-link" title="Give us a star on GitHub">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          </a>
          <div class="github-tooltip">⭐ Please give a star on GitHub!</div>
        </div>
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme">🌙</button>
      </div>
    </div>

    <!-- Home View -->
    <div class="home-view" id="home-view"></div>

    <!-- Algorithm View -->
    <div class="algo-view" id="algo-view">
      <div class="algo-header-bar">
        <div class="algo-title-area">
          <h2 id="algo-title"></h2>
          <p class="algo-desc" id="algo-desc"></p>
          <div class="algo-how-it-works" id="algo-how"></div>
        </div>
        <div class="complexity-badges" id="complexity-badges"></div>
      </div>
      <div class="input-panel" id="input-panel"></div>
      <div class="algo-body">
        <div class="viz-area">
          <div class="canvas-container" id="canvas-container">
            <canvas id="viz-canvas"></canvas>
          </div>
          <div class="step-info">
            <span class="step-desc" id="step-desc">Press ▶ Play or click Step to begin</span>
            <span class="step-counter" id="step-counter"></span>
          </div>
          <div class="controls-bar">
            <button class="ctrl-btn" id="btn-first" title="First step">⏮</button>
            <button class="ctrl-btn" id="btn-prev" title="Previous step">⏪</button>
            <button class="ctrl-btn play-btn" id="btn-play" title="Play/Pause">▶</button>
            <button class="ctrl-btn" id="btn-next" title="Next step">⏩</button>
            <button class="ctrl-btn" id="btn-last" title="Last step">⏭</button>
            <div class="speed-control">
              <label>Speed</label>
              <input type="range" id="speed-slider" min="1" max="10" value="5">
              <span class="speed-value" id="speed-value">1x</span>
            </div>
          </div>
        </div>
        <div class="panel-resizer" id="panel-resizer" title="Drag to resize"></div>
        <div class="code-panel" id="code-panel">
          <div class="code-tabs" id="code-tabs">
            <button class="code-tab active" data-lang="cpp">C++</button>
            <button class="code-tab" data-lang="java">Java</button>
            <button class="code-tab" data-lang="python">Python</button>
            <button class="code-copy-btn" id="code-copy" title="Copy code">📋 Copy</button>
          </div>
          <div class="code-content" id="code-content"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="js/app.js"></script>
<script src="js/algorithms/sorting/bubble-sort.js"></script>
<script src="js/algorithms/sorting/selection-sort.js"></script>
<script src="js/algorithms/sorting/insertion-sort.js"></script>
<script src="js/algorithms/sorting/merge-sort.js"></script>
<script src="js/algorithms/sorting/quick-sort.js"></script>
<script src="js/algorithms/searching/linear-search.js"></script>
<script src="js/algorithms/searching/binary-search.js"></script>
<script src="js/algorithms/data-structures/stack.js"></script>
<script src="js/algorithms/data-structures/queue.js"></script>
<script src="js/algorithms/data-structures/linked-list.js"></script>
<script src="js/algorithms/trees/bst.js"></script>
<script src="js/algorithms/trees/avl-tree.js"></script>
<script src="js/algorithms/trees/heap.js"></script>
<script src="js/algorithms/trees/trie.js"></script>
<script src="js/algorithms/graph/bfs-dfs.js"></script>
<script src="js/algorithms/graph/dijkstra.js"></script>
<script src="js/algorithms/graph/kruskal.js"></script>
<script src="js/algorithms/dp/fibonacci.js"></script>
<script src="js/algorithms/dp/knapsack.js"></script>
<script src="js/algorithms/backtracking/n-queens.js"></script>
</body>
</html>
